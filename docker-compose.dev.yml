version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: soukna
      POSTGRES_PASSWORD: soukna_password
      POSTGRES_DB: soukna_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soukna"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dev-deps
    working_dir: /app
    command: npm run dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://soukna:soukna_password@db:5432/soukna_db
      - JWT_SECRET=dev_jwt_secret_soukna_change_in_prod
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-demo}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - NODE_ENV=development
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      target: deps
    working_dir: /app
    command: npm run dev -- --host
    volumes:
      - ./admin:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3080/api
    ports:
      - "3002:5173"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "3080:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - admin
    restart: unless-stopped

volumes:
  postgres_data:
    name: soukna_postgres_data
