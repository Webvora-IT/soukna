version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soukna}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?DB password required}
      POSTGRES_DB: ${POSTGRES_DB:-soukna_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soukna}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soukna_network

  backend:
    build:
      context: ./backend
      target: runner
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-soukna}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-soukna_db}
      - JWT_SECRET=${JWT_SECRET:?JWT secret required}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - NODE_ENV=production
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - soukna_network

  admin:
    build:
      context: ./admin
      target: runner
    restart: always
    networks:
      - soukna_network

  vendor:
    build:
      context: ./vendor
    ports:
      - "3003:80"
    depends_on:
      - backend
    restart: always
    networks:
      - soukna_network

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "82:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - admin
      - vendor
    restart: always
    networks:
      - soukna_network

volumes:
  postgres_data:
    name: soukna_postgres_data_prod

networks:
  soukna_network:
    name: soukna_network
