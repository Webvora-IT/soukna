upstream backend_prod {
    server backend:5000;
    keepalive 32;
}

upstream admin_prod {
    server admin:80;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
    listen 80;
    server_name soukna.mr www.soukna.mr admin.soukna.mr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name soukna.mr www.soukna.mr;

    ssl_certificate /etc/nginx/ssl/soukna.crt;
    ssl_certificate_key /etc/nginx/ssl/soukna.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Backend API
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check
    location /health {
        proxy_pass http://backend_prod;
        access_log off;
    }

    # Admin Panel
    location / {
        proxy_pass http://admin_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            proxy_pass http://admin_prod;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}

server {
    listen 443 ssl http2;
    server_name admin.soukna.mr;

    ssl_certificate /etc/nginx/ssl/soukna.crt;
    ssl_certificate_key /etc/nginx/ssl/soukna.key;

    # IP whitelist for admin (optional)
    # allow 196.132.0.0/16;  # Mauritanie Telecom
    # deny all;

    location / {
        proxy_pass http://admin_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            proxy_pass http://admin_prod;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
